<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MKDS | Fotoğraf Galerisi</title>
    <meta
      name="description"
      content="MKDS fotoğraf galerisi. Tüm grup görsellerini tek sayfada keşfedin."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-noise" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="index.html" aria-label="MKDS Ana Sayfa">MKDS</a>
      <nav class="site-nav open" aria-label="Galeri menüsü">
        <a href="index.html#media">Ana Sayfaya Dön</a>
      </nav>
    </header>

    <main class="gallery-page">
      <section class="section">
        <div class="section-head">
          <p class="kicker">Görseller</p>
          <h1>Fotoğraf Galerisi</h1>
          <p class="statline">MKDS arşivinden tüm fotoğraflar</p>
        </div>

        <div class="gallery-page-grid" aria-label="Tüm MKDS fotoğrafları">
          <figure class="gallery-photo">
            <img src="assets/images/banner.png" alt="MKDS banner fotoğrafı" loading="lazy" />
            <figcaption>Banner - DSC_6182 (1)</figcaption>
          </figure>
          <figure class="gallery-photo">
            <img src="assets/images/selin-kaplan.png" alt="Selin Kaplan portre fotoğrafı" loading="lazy" />
            <figcaption>Selin Kaplan - IMG_5098</figcaption>
          </figure>
          <figure class="gallery-photo">
            <img src="assets/images/kerem-kaplan.png" alt="Kerem Kaplan portre fotoğrafı" loading="lazy" />
            <figcaption>Kerem Kaplan - DSC_6186</figcaption>
          </figure>
          <figure class="gallery-photo">
            <img src="assets/images/group-1.png" alt="MKDS grup fotoğrafı" loading="lazy" />
            <figcaption>Grup - DSC_6179</figcaption>
          </figure>
          <figure class="gallery-photo">
            <img src="assets/images/group-2.png" alt="MKDS grup fotoğrafı" loading="lazy" />
            <figcaption>Grup - DSC_6182</figcaption>
          </figure>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 MKDS. All rights reserved.</p>
    </footer>
  </body>
</html>
