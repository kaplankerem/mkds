<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MKDS | Fotoğraf Galerisi</title>
    <meta
      name="description"
      content="MKDS fotoğraf galerisi. Tüm grup görsellerini tek sayfada keşfedin."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-noise" aria-hidden="true"></div>

    <header class="site-header">
      <a class="brand" href="index.html" aria-label="MKDS Ana Sayfa">MKDS</a>
      <nav class="site-nav open" aria-label="Galeri menüsü">
        <a href="index.html#media">Ana Sayfaya Dön</a>
      </nav>
    </header>

    <main class="gallery-page">
      <section class="section">
        <div class="section-head">
          <p class="kicker">Görseller</p>
          <h1>Fotoğraf Galerisi</h1>
          <p class="statline">MKDS arşivinden tüm fotoğraflar</p>
        </div>

        <div class="gallery-page-grid" aria-label="Tüm MKDS fotoğrafları">
          <figure class="gallery-photo"><figcaption>Live Session I</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Live Session II</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Live Session III</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Studio Frame I</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Studio Frame II</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Studio Frame III</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Backstage I</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Backstage II</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Backstage III</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Portrait I</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Portrait II</figcaption></figure>
          <figure class="gallery-photo"><figcaption>Portrait III</figcaption></figure>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 MKDS. All rights reserved.</p>
    </footer>
  </body>
</html>
